{% extends "base.html" %}

{% block title %}Создание задачи - Task Manager{% endblock %}

{% block content %}
<h1 style="margin-bottom: 1.5rem; color: var(--accent-green);">Создание задачи</h1>

<div class="card">
    <form method="POST" action="/tasks/create" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="due_date">Срок выполнения</label>
            <input type="datetime-local" id="due_date" name="due_date">
        </div>
        <div class="form-group">
            <label for="category_id">Категория</label>
            <select id="category_id" name="category_id">
                <option value="">Без категории</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="parent_id">Родительская задача</label>
            <select id="parent_id" name="parent_id">
                <option value="">Без родителя (корневая)</option>
                {% for parent in available_parents %}
                <option value="{{ parent.id }}" {% if parent_id and parent.id == parent_id|int %}selected{% endif %}>
                    {{ parent.title }} (ID: {{ parent.id }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="preview">Превью изображение</label>
            <input type="file" id="preview" name="preview" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">Создать</button>
        <a href="/tasks" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
