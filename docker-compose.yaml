services:
  postgresql:
    image: postgres:15-alpine
    container_name: taskmanager_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tasknetwork

  app:
    build: ./app
    container_name: taskmanager_app
    depends_on:
      - postgresql
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}
      DOMAIN: ${DOMAIN}
      SECRET_KEY: ${SECRET_KEY}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE}
      GIGACHAT_AUTHORIZATION_KEY: ${GIGACHAT_AUTHORIZATION_KEY}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL}
    volumes:
      - ./app:/app
      - ./app/uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - tasknetwork
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    depends_on:
      - app
    ports:
      - "80:80"
      #- "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./app/static:/usr/share/nginx/html/static
      - ./app/uploads:/usr/share/nginx/html/uploads
    networks:
      - tasknetwork

volumes:
  postgres_data:

networks:
  tasknetwork:
    driver: bridge